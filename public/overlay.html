<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>iPad Draw Bridge — 框選工具</title>
    <style>
      :root {
        --bg-mask: rgba(4, 9, 22, 0.52);
        --panel: rgba(9, 16, 32, 0.95);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --text: #f1f5f9;
        --muted: #8b9ab5;
        --subtle: rgba(139, 154, 181, 0.55);
        --cyan: #22d3ee;
        --cyan-dim: rgba(34, 211, 238, 0.15);
        --accent: #3b82f6;
        --danger: #ef4444;
        --danger-dim: rgba(239, 68, 68, 0.12);
        --danger-border: rgba(239, 68, 68, 0.3);
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text",
          "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        background: transparent;
      }

      /* ─── Stage (full screen overlay) ─── */
      #stage {
        position: fixed;
        inset: 0;
        background: var(--bg-mask);
      }

      /* ─── Selection hole ─── */
      #mask-hole {
        position: absolute;
        border: 2px solid var(--cyan);
        box-shadow:
          0 0 0 99999px rgba(4, 9, 22, 0.58),
          0 0 30px rgba(34, 211, 238, 0.15),
          inset 0 0 40px rgba(34, 211, 238, 0.04);
        cursor: move;
        border-radius: 2px;
      }

      /* Corner label showing dimensions */
      #mask-hole::after {
        content: attr(data-label);
        position: absolute;
        bottom: calc(100% + 8px);
        left: 0;
        font-size: 12px;
        font-weight: 500;
        font-family: "SF Mono", "Fira Code", monospace;
        color: var(--cyan);
        background: rgba(9, 16, 32, 0.9);
        border: 1px solid rgba(34, 211, 238, 0.25);
        padding: 3px 8px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        letter-spacing: 0.02em;
      }

      #frame {
        position: absolute;
        inset: 0;
      }

      /* ─── Resize handles ─── */
      .handle {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.9);
        background: var(--cyan);
        box-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }

      .handle:hover {
        transform: scale(1.3);
        box-shadow: 0 0 14px rgba(34, 211, 238, 0.7);
      }

      .handle.nw { left: -6px;  top: -6px;    cursor: nwse-resize; }
      .handle.ne { right: -6px; top: -6px;    cursor: nesw-resize; }
      .handle.sw { left: -6px;  bottom: -6px; cursor: nesw-resize; }
      .handle.se { right: -6px; bottom: -6px; cursor: nwse-resize; }
      .handle.n  { left: calc(50% - 6px); top: -6px;    cursor: ns-resize; }
      .handle.s  { left: calc(50% - 6px); bottom: -6px; cursor: ns-resize; }
      .handle.w  { left: -6px;  top: calc(50% - 6px);   cursor: ew-resize; }
      .handle.e  { right: -6px; top: calc(50% - 6px);   cursor: ew-resize; }

      /* ─── Toolbar ─── */
      #toolbar {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 10;
        background: var(--panel);
        border: 1px solid var(--border-strong);
        border-radius: 14px;
        padding: 12px 14px;
        width: min(680px, calc(100vw - 32px));
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.55),
          0 0 0 0.5px rgba(255, 255, 255, 0.04) inset;
      }

      .toolbar-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .toolbar-icon {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: linear-gradient(135deg, #2563eb 0%, #22d3ee 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
      }

      .toolbar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      /* Divider */
      .toolbar-divider {
        height: 1px;
        background: var(--border);
        margin: 0 -2px 10px;
      }

      /* Button row */
      #toolbar .top-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 10px;
      }

      #toolbar button {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 13px;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        letter-spacing: -0.01em;
        transition: all 0.14s ease;
        outline: none;
        white-space: nowrap;
      }

      #toolbar button:active {
        transform: scale(0.96);
      }

      /* Default */
      #toolbar button {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border-strong);
        color: var(--text);
      }

      #toolbar button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }

      /* Primary */
      #toolbar button.primary {
        background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        border: 1px solid rgba(59, 130, 246, 0.5);
        color: #fff;
        box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
      }

      #toolbar button.primary:hover {
        background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
      }

      /* Danger */
      #toolbar button.danger {
        background: var(--danger-dim);
        border: 1px solid var(--danger-border);
        color: #fca5a5;
      }

      #toolbar button.danger:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      /* ─── Info / Hint ─── */
      .info-row {
        display: flex;
        align-items: baseline;
        gap: 4px;
        flex-wrap: wrap;
      }

      #info {
        font-size: 12.5px;
        color: var(--muted);
        font-family: "SF Mono", "Fira Code", monospace;
        letter-spacing: 0.01em;
        line-height: 1.5;
      }

      #hint {
        font-size: 11.5px;
        color: var(--subtle);
        line-height: 1.5;
        margin-top: 3px;
      }

      .kbd {
        display: inline-block;
        padding: 1px 5px;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px;
        font-size: 11px;
        background: rgba(255,255,255,0.06);
        color: var(--muted);
        font-family: inherit;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="mask-hole">
        <div id="frame">
          <div class="handle nw" data-handle="nw"></div>
          <div class="handle ne" data-handle="ne"></div>
          <div class="handle sw" data-handle="sw"></div>
          <div class="handle se" data-handle="se"></div>
          <div class="handle n"  data-handle="n"></div>
          <div class="handle s"  data-handle="s"></div>
          <div class="handle w"  data-handle="w"></div>
          <div class="handle e"  data-handle="e"></div>
        </div>
      </div>
    </div>

    <div id="toolbar">
      <div class="toolbar-header">
        <div class="toolbar-icon">⬛</div>
        <div class="toolbar-title">螢幕框選工具</div>
      </div>
      <div class="toolbar-divider"></div>
      <div class="top-row">
        <button id="fullscreenBtn">全螢幕模式（建議）</button>
        <button id="saveBtn" class="primary">套用框選</button>
        <button id="fitBtn">重設全螢幕</button>
        <button id="toggleMaskBtn">切換遮罩</button>
        <button id="closeBtn" class="danger">關閉</button>
      </div>
      <div class="info-row">
        <div id="info">讀取中...</div>
      </div>
      <div id="hint">拖拉框內移動｜拖拉四角或四邊調整大小｜<span class="kbd">Enter</span> 套用｜<span class="kbd">Esc</span> 關閉</div>
    </div>

    <script>
      const stage = document.getElementById("stage");
      const hole = document.getElementById("mask-hole");
      const frame = document.getElementById("frame");
      const info = document.getElementById("info");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const saveBtn = document.getElementById("saveBtn");
      const fitBtn = document.getElementById("fitBtn");
      const toggleMaskBtn = document.getElementById("toggleMaskBtn");
      const closeBtn = document.getElementById("closeBtn");

      let config = null;
      let maskVisible = true;
      let rect = { x: 100, y: 100, width: 600, height: 400 };
      let drag = null;

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function setInfo(text) {
        info.textContent = text;
      }

      function getViewportSize() {
        return { width: window.innerWidth, height: window.innerHeight };
      }

      function toViewport(screenRect) {
        const viewport = getViewportSize();
        const sx = viewport.width / config.screen.width;
        const sy = viewport.height / config.screen.height;
        return {
          x: Math.round(screenRect.x * sx),
          y: Math.round(screenRect.y * sy),
          width: Math.max(1, Math.round(screenRect.width * sx)),
          height: Math.max(1, Math.round(screenRect.height * sy))
        };
      }

      function toScreen(viewportRect) {
        const viewport = getViewportSize();
        const sx = config.screen.width / viewport.width;
        const sy = config.screen.height / viewport.height;
        return {
          x: Math.round(viewportRect.x * sx),
          y: Math.round(viewportRect.y * sy),
          width: Math.max(1, Math.round(viewportRect.width * sx)),
          height: Math.max(1, Math.round(viewportRect.height * sy))
        };
      }

      function applyRect() {
        const viewport = getViewportSize();
        rect.x = clamp(rect.x, 0, viewport.width - 1);
        rect.y = clamp(rect.y, 0, viewport.height - 1);
        rect.width = clamp(rect.width, 1, viewport.width - rect.x);
        rect.height = clamp(rect.height, 1, viewport.height - rect.y);

        hole.style.left = `${rect.x}px`;
        hole.style.top = `${rect.y}px`;
        hole.style.width = `${rect.width}px`;
        hole.style.height = `${rect.height}px`;

        const screenRect = toScreen(rect);
        const label = `${screenRect.width} × ${screenRect.height}`;
        hole.setAttribute("data-label", label);
        setInfo(
          `X ${screenRect.x}  Y ${screenRect.y}  W ${screenRect.width}  H ${screenRect.height}  ·  螢幕 ${config.screen.width}×${config.screen.height}`
        );
      }

      function startDrag(event, mode) {
        event.preventDefault();
        drag = {
          mode,
          startX: event.clientX,
          startY: event.clientY,
          baseRect: { ...rect }
        };
        stage.setPointerCapture(event.pointerId);
      }

      function updateDrag(clientX, clientY) {
        if (!drag) return;
        const dx = clientX - drag.startX;
        const dy = clientY - drag.startY;
        const base = drag.baseRect;
        const viewport = getViewportSize();
        let next = { ...base };

        if (drag.mode === "move") {
          next.x = base.x + dx;
          next.y = base.y + dy;
        } else {
          if (drag.mode.includes("e")) {
            next.width = base.width + dx;
          }
          if (drag.mode.includes("s")) {
            next.height = base.height + dy;
          }
          if (drag.mode.includes("w")) {
            next.x = base.x + dx;
            next.width = base.width - dx;
          }
          if (drag.mode.includes("n")) {
            next.y = base.y + dy;
            next.height = base.height - dy;
          }
        }

        next.width = Math.max(1, next.width);
        next.height = Math.max(1, next.height);

        if (next.x < 0) {
          next.width += next.x;
          next.x = 0;
        }
        if (next.y < 0) {
          next.height += next.y;
          next.y = 0;
        }
        if (next.x + next.width > viewport.width) {
          next.width = viewport.width - next.x;
        }
        if (next.y + next.height > viewport.height) {
          next.height = viewport.height - next.y;
        }

        rect = next;
        applyRect();
      }

      function stopDrag(event) {
        if (!drag) return;
        drag = null;
        stage.releasePointerCapture(event.pointerId);
      }

      async function loadConfig() {
        const res = await fetch("/api/config");
        if (!res.ok) {
          throw new Error("讀取設定失敗");
        }
        config = await res.json();
        const region = config.region || {
          x: 0,
          y: 0,
          width: config.screen.width,
          height: config.screen.height
        };
        rect = toViewport(region);
        applyRect();
      }

      async function saveRegion() {
        const screenRect = toScreen(rect);
        const res = await fetch("/api/region", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(screenRect)
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "儲存失敗");
        }
        setInfo(`已套用：X ${data.region.x}  Y ${data.region.y}  W ${data.region.width}  H ${data.region.height}`);
      }

      function setFullViewportRect() {
        const viewport = getViewportSize();
        rect = { x: 0, y: 0, width: viewport.width, height: viewport.height };
        applyRect();
      }

      function toggleMask() {
        maskVisible = !maskVisible;
        hole.style.boxShadow = maskVisible
          ? "0 0 0 99999px rgba(4, 9, 22, 0.58), 0 0 30px rgba(34, 211, 238, 0.15), inset 0 0 40px rgba(34, 211, 238, 0.04)"
          : "none";
      }

      hole.addEventListener("pointerdown", (event) => {
        const handle = event.target.getAttribute("data-handle");
        if (handle) {
          startDrag(event, handle);
          return;
        }
        startDrag(event, "move");
      });

      stage.addEventListener("pointermove", (event) => {
        if (!drag) return;
        updateDrag(event.clientX, event.clientY);
      });

      stage.addEventListener("pointerup", stopDrag);
      stage.addEventListener("pointercancel", stopDrag);

      saveBtn.addEventListener("click", async () => {
        try {
          await saveRegion();
        } catch (error) {
          setInfo(error.message);
        }
      });

      fitBtn.addEventListener("click", () => {
        setFullViewportRect();
      });

      toggleMaskBtn.addEventListener("click", () => {
        toggleMask();
      });

      closeBtn.addEventListener("click", () => {
        window.close();
      });

      fullscreenBtn.addEventListener("click", async () => {
        try {
          await document.documentElement.requestFullscreen();
          setTimeout(() => applyRect(), 120);
        } catch {
          setInfo("無法切換全螢幕，請手動按 F11。");
        }
      });

      window.addEventListener("resize", () => {
        if (!config) return;
        const screenRect = toScreen(rect);
        rect = toViewport(screenRect);
        applyRect();
      });

      window.addEventListener("keydown", async (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          try {
            await saveRegion();
          } catch (error) {
            setInfo(error.message);
          }
        } else if (event.key === "Escape") {
          event.preventDefault();
          window.close();
        }
      });

      loadConfig().catch((error) => {
        setInfo(error.message);
      });
    </script>
  </body>
</html>
